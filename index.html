<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frank Cooper</title>
<link href="<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #0a0a0a;
    color: white;
    text-align: center;
}

.hero {
    height: 100vh;
    background: 
        linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.85)),
        url('IMG_4306.png') center center / cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 3.5rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: white;
}
.tagline {
    margin-top: 20px;
    font-weight: 300;
    font-size: 1.2rem;
    opacity: 0.85;
    letter-spacing: 2px;
}

.stream-buttons {
    margin-top: 40px;
}

.stream-buttons a {
    text-decoration: none;
    color: white;
    border: 1px solid white;
    padding: 12px 22px;
    margin: 8px;
    display: inline-block;
    transition: 0.3s ease;
    font-size: 0.9rem;
    letter-spacing: 1px;
}

.stream-buttons a:hover {
    background: white;
    color: black;
}

.section {
    padding: 100px 20px;
}

.section h2 {
    margin-bottom: 40px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
}

iframe {
    max-width: 90%;
    border-radius: 12px;
}

.contact a {
    color: white;
    text-decoration: none;
    border-bottom: 1px solid white;
}

footer {
    padding: 40px;
    font-size: 0.8rem;
    opacity: 0.5;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<section class="hero">
    <h1>FRANK COOPER</h1>
    <div class="tagline">Every mile tells a story</div>

    <div class="stream-buttons">
        <a href="https://music.apple.com/us/artist/frank-cooper/1868493795" target="_blank">Apple Music</a>
        <a href="https://open.spotify.com/artist/6MZDTx942IorIJjioFpvij" target="_blank">Spotify</a>
        <a href="https://pandora.app.link/Ev85Iubr70b" target="_blank">Pandora</a>
        <a href="https://music.amazon.com/artists/B0GK7GTMQ3" target="_blank">Amazon Music</a>
        <a href="https://youtube.com/@frankcoopermusic" target="_blank">YouTube</a>
        <a href="https://www.tiktok.com/@mrfrankcooper" target="_blank">TikTok</a>
    </div>
</section>

<section class="section">
    <h2>Featured Release</h2>
    <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/artist/6MZDTx942IorIJjioFpvij?utm_source=generator"
        width="100%" height="352"
        frameBorder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
</section>

<section class="section contact">
    <h2>Contact</h2>
    <p>Email</p>
    <p><a href="mailto:FrankCooperMusic@gmail.com">FrankCooperMusic@gmail.com</a></p>
</section>

<footer>
    © 2026 Frank Cooper. All Rights Reserved.
</footer>

</body>
</html>
