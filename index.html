<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frank Cooper</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #0d0d0d;
    color: white;
    text-align: center;
}

.hero {
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.9)), url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    font-size: 4rem;
    letter-spacing: 5px;
}

.tagline {
    margin-top: 20px;
    font-weight: 300;
    font-size: 1.2rem;
    opacity: 0.8;
}

.stream-buttons {
    margin-top: 40px;
}

.stream-buttons a {
    text-decoration: none;
    color: white;
    border: 1px solid white;
    padding: 12px 20px;
    margin: 8px;
    display: inline-block;
    transition: 0.3s;
}

.stream-buttons a:hover {
    background: white;
    color: black;
}

.section {
    padding: 80px 20px;
}

.section h2 {
    margin-bottom: 30px;
    font-weight: 600;
}

iframe {
    max-width: 90%;
    border-radius: 10px;
}

.contact a {
    color: white;
    text-decoration: none;
    border-bottom: 1px solid white;
}

footer {
    padding: 30px;
    font-size: 0.8rem;
    opacity: 0.5;
}
</style>
</head>

<body>

<section class="hero">
    <h1>FRANK COOPER</h1>
    <div class="tagline">If love had a map, I'd follow it home.</div>
    <div class="stream-buttons">
        <a href="https://music.apple.com/us/artist/frank-cooper/1868493795" target="_blank">Apple Music</a>
        <a href="https://open.spotify.com/artist/6MZDTx942IorIJjioFpvij" target="_blank">Spotify</a>
        <a href="https://pandora.app.link/Ev85Iubr70b" target="_blank">Pandora</a>
        <a href="https://music.amazon.com/artists/B0GK7GTMQ3" target="_blank">Amazon Music</a>
        <a href="https://youtube.com/@frankcoopermusic" target="_blank">YouTube</a>
        <a href="https://www.tiktok.com/@mrfrankcooper" target="_blank">TikTok</a>
    </div>
</section>

<section class="section">
    <h2>Watch</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed?listType=user_uploads&list=frankcoopermusic" frameborder="0" allowfullscreen></iframe>
</section>

<section class="section contact">
    <h2>Contact</h2>
    <p>Booking & Inquiries</p>
    <p><a href="mailto:FrankCooperMusic@gmail.com">FrankCooperMusic@gmail.com</a></p>
</section>

<footer>
    © 2026 Frank Cooper. All Rights Reserved.
</footer>

</body>
</html>
